name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  ci:
    name: Continuous Integration on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0

      - name: Set up uv
        run: devbox run -- uv sync --locked

      - name: Check formatting
        run: devbox run -- uv run ruff format --check

      - name: Lint
        run: devbox run -- uv run ruff check

      - name: Type check
        run: devbox run -- uv run mypy .

      - name: Run tests
        run: devbox run -- uv run pytest --cov=src/factortool --cov-report=term-missing

  # Devbox is not currently natively supported on Windows (and may never be), so we use uv directly here.
  ci-windows:
    name: Continuous Integration on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.6"

      - name: Set up uv
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest --cov=src/factortool --cov-report=term-missing
