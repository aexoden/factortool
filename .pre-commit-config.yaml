# Pre-commit configuration
# Install: pre-commit install
# Update: pre-commit autoupdate

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Python
  - repo: local
    hooks:
      - id: uv-lock
        name: uv lockfile check
        description: Check that the uv lockfile is up to date
        entry: devbox run -- uv lock --check
        language: system
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        description: Lint Python files using ruff
        entry: devbox run -- uv run ruff check
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        description: Check Python file formatting using ruff
        entry: devbox run -- uv run ruff format --check
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy type checker
        description: Type check Python files using mypy
        entry: devbox run -- uv run mypy .
        language: system
        pass_filenames: false

      - id: test
        name: pytest with coverage
        description: Run pytest and generate coverage report
        entry: devbox run -- uv run pytest --cov=src/factortool --cov-report=term-missing
        language: system
        pass_filenames: false
